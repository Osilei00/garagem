{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Garagem Miniaturas</title>
  <meta name="description" content="Acesse sua conta na Garagem de Miniaturas.">
  <link rel="stylesheet" href="{% static 'garagem_app/css/style.css' %}">
</head>
<body>

{% if messages %}
<div class="messages-container" id="messages-container">
  {% for msg in messages %}
  <div class="alert alert-{{ msg.tags }}" onclick="this.remove()">❌ {{ msg }}</div>
  {% endfor %}
</div>
{% endif %}

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <span class="logo-big">🚗 Garagem</span>
      <span class="logo-tagline">Sua coleção de miniaturas, organizada</span>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Entrar na sua conta</h1>

      <form method="post" id="login-form">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="id_username">Usuário</label>
          <input
            id="id_username"
            name="username"
            type="text"
            class="form-control"
            placeholder="Seu nome de usuário"
            autocomplete="username"
            required
          >
        </div>
        <div class="form-group">
          <label class="form-label" for="id_password">Senha</label>
          <input
            id="id_password"
            name="password"
            type="password"
            class="form-control"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-full" style="justify-content:center; margin-top:8px;">
          Entrar →
        </button>
      </form>
    </div>

    <div class="auth-footer">
      Ainda não tem conta?
      <a href="{% url 'register' %}">Cadastre-se gratuitamente</a>
    </div>
  </div>
</div>

<script>
  setTimeout(() => {
    const c = document.getElementById('messages-container');
    if (c) c.remove();
  }, 4000);
</script>
</body>
</html>
